<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salon Demo Site</title>

    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap"
        rel="stylesheet">

    <script src="https://cdn.tailwindcss.com"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        gold: '#D4AF37',
                    },
                    fontFamily: {
                        serif: [ 'Playfair Display', 'serif' ],
                        sans: [ 'Poppins', 'sans-serif' ],
                    }
                }
            }
        }
    </script>
</head>

<body>
    <nav
        class="fixed w-full z-50 bg-white/90 backdrop-blur-sm border-b border-gray-100 py-4 px-8 flex justify-between items-center">
        <div class="text-2xl font-serif font-bold tracking-tighter uppercase">
            ABELA<span class="text-gold italic">ZAGOL</span>
        </div>

        <div class="hidden md:flex space-x-10 text-xs uppercase tracking-[0.2em] font-medium text-gray-600">
            <a href="#home" class="hover:text-gold transition-colors">Home</a>
            <a href="#services" class="hover:text-gold transition-colors">Services</a>
            <a href="#gallery" class="hover:text-gold transition-colors">Gallery</a>
            <a href="#contact" class="hover:text-gold transition-colors">Contact</a>
        </div>

        <button
            class="bg-black text-white px-6 py-2 text-[10px] uppercase tracking-widest hover:bg-gold transition-all duration-300">
            Book Appointment
        </button>
    </nav>

    <section id="home"
        class="relative h-screen flex items-center justify-center text-center px-4 overflow-hidden bg-black">
        <div class="absolute inset-0 z-0">
            <img src="https://images.unsplash.com/photo-1521590832167-7bcbfaa6381f?auto=format&fit=crop&q=80&w=1920"
                class="w-full h-full object-cover opacity-60" alt="Luxury Salon Interior">
        </div>

        <div class="relative z-10 max-w-4xl space-y-8 mt-16">
            <span class="text-gold text-xs uppercase tracking-[0.4em] font-semibold block animate-pulse">
                Established in Addis Ababa
            </span>

            <h1 class="font-serif text-5xl md:text-8xl text-white mb-6 leading-tight drop-shadow-2xl">
                Luxury Hair & Beauty <br>
                <span class="italic text-gold">Experience</span>
            </h1>

            <p class="text-gray-200 text-lg md:text-xl mb-12 max-w-2xl mx-auto font-light leading-relaxed">
                Premium braids, wigs, manicure and pedicure tailored for the modern woman.
                Step into elegance at our Summit location.
            </p>

            <div class="flex flex-col md:flex-row gap-6 justify-center items-center">
                <a href="https://wa.me/yournumber"
                    class="bg-[#25D366] text-white px-10 py-5 rounded-sm font-semibold text-sm uppercase tracking-widest hover:bg-white hover:text-black transition-all duration-500 w-full md:w-auto shadow-xl">
                    Book via WhatsApp
                </a>
                <a href="#services"
                    class="backdrop-blur-md border border-white text-white px-10 py-5 rounded-sm font-semibold text-sm uppercase tracking-widest hover:bg-white hover:text-black transition-all duration-500 w-full md:w-auto">
                    Explore Services
                </a>
            </div>
        </div>

        <div class="absolute bottom-0 left-0 w-full h-32 bg-gradient-to-t from-white to-transparent"></div>
    </section>
</body>

</html>
